type: object
description: Schema definition for the email_send table
additionalProperties: false

properties:
  id:
    type: string
    format: uuid
    description: Unique identifier for the email record

  to_email:
    type: string
    format: email
    description: Primary recipient email address

  cc_email:
    type: array
    description: List of CC recipient email addresses
    items:
      type: string
      format: email

  bcc_email:
    type: array
    description: List of BCC recipient email addresses
    items:
      type: string
      format: email

  from_email:
    type: string
    format: email
    description: Sender email address

  subject:
    type: string
    maxLength: 255
    description: Email subject line

  body_text:
    type: string
    description: Plain text version of the email body

  body_html:
    type: string
    description: HTML version of the email body

  attachments:
    type: array
    description: List of email attachments
    items:
      type: object
      additionalProperties: false
      properties:
        file_name:
          type: string
        content_type:
          type: string
        file_size:
          type: integer
          minimum: 0
        file_url:
          type: string
          format: uri
      required:
        - file_name
        - content_type
        - file_size

  status:
    type: string
    description: Current status of the email
    enum:
      - pending
      - queued
      - sent
      - failed
      - bounced

  provider:
    type: string
    description: Email service provider used to send the email

  provider_message_id:
    type: string
    description: Message ID returned by the email provider

  retry_count:
    type: integer
    minimum: 0
    description: Number of send retry attempts

  error_message:
    type: string
    description: Error message if sending failed

  sent_at:
    type: string
    format: date-time
    description: Timestamp when the email was successfully sent

  created_at:
    type: string
    format: date-time
    description: Record creation timestamp

  updated_at:
    type: string
    format: date-time
    description: Record last update timestamp

required:
  - id
  - to_email
  - from_email
  - subject
  - status
  - created_at
