type: object
properties:
  item_id:
    type: integer
  product_id:
    type: integer
  store_id:
    type: integer
  quantity_on_hand:
    type: integer
  quantity_reserved:
    type: integer
  reorder_level:
    type: integer
  reorder_quantity:
    type: integer
  last_restock_date:
    type: timestamp
  last_sold_date:
    type: timestamp
  _record_id:
    type: string
    description: Unique identifier for the record.
  _load_date:
    type: timestamp
    description: Timestamp indicating when the record was loaded.
  _trace:
    type: object
    properties:
      _record_id:
        type: string
      _source_table:
        type: string
    description: Tracking metadata for lineage and traceability.
  _dq_issue:
    type: boolean
    description: Flag indicating if the record has a data quality issue.
  _dq_issue_reason:
    type: array
    items:
      type: string
    description: Reason for the data quality issue.
  _silver_ts:
    type: timestamp
    description: Timestamp indicating when the record was written.
required:
- item_id
- product_id
- store_id
