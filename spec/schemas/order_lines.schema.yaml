type: object
properties:
  line_item_id:
    type: long
  order_id:
    type: long
  dt:
    type: timestamp
  product_id:
    type: integer
  sku:
    type: string
  quantity:
    type: integer
  unit_price:
    type: decimal(20,8)
  gross_amn:
    type: decimal(20,8)
  net_amn:
    type: decimal(20,8)
  tax_amn:
    type: decimal(20,8)
  disc_amn:
    type: decimal(20,8)
  return_flag:
    type: boolean
  return_reason:
    type: string
  _record_id:
    type: string
    description: Unique identifier for the record.
  _load_date:
    type: timestamp
    description: Timestamp indicating when the record was loaded.
  _trace:
    type: object
    properties:
      _record_id:
        type: string
      _source_table:
        type: string
    description: Tracking metadata for lineage and traceability.
  _dq_issue:
    type: boolean
    description: Flag indicating if the record has a data quality issue.
  _dq_issue_reason:
    type: array
    items:
      type: string
    description: Reason for the data quality issue.
  _silver_ts:
    type: timestamp
    description: Timestamp indicating when the record was written.
required:
- line_item_id
- order_id
- product_id
