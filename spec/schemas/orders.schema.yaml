type: object
properties:
  order_id:
    type: long
  dt:
    type: timestamp
  customer_id:
    type: string
  store_id:
    type: integer
  employee_id:
    type: string
  order_status:
    type: string
    description: Order status (e.g., completed, returned, cancelled).
  total_items:
    type: integer
  gross_amn:
    type: decimal(20,8)
  net_amn:
    type: decimal(20,8)
  tax_amn:
    type: decimal(20,8)
  disc_amn:
    type: decimal(20,8)
  payment_method:
    type: string
    description: Payment method (e.g., cash, card, digital_wallet).
  currency_code:
    type: string
  _record_id:
    type: string
    description: Unique identifier for the record.
  _load_date:
    type: timestamp
    description: Timestamp indicating when the record was loaded.
  _trace:
    type: object
    properties:
      _record_id:
        type: string
      _source_table:
        type: string
    description: Tracking metadata for lineage and traceability.
  _dq_issue:
    type: boolean
    description: Flag indicating if the record has a data quality issue.
  _dq_issue_reason:
    type: array
    items:
      type: string
    description: Reason for the data quality issue.
  _silver_ts:
    type: timestamp
    description: Timestamp indicating when the record was written.
required:
- order_id
- dt
- customer_id
