type: object
properties:
  product_id:
    type: integer
  sku:
    type: string
  product_name:
    type: string
  category:
    type: string
  subcategory:
    type: string
  brand:
    type: string
  unit_price:
    type: decimal(20,8)
  cost_price:
    type: decimal(20,8)
  currency_code:
    type: string
  is_active:
    type: boolean
  created_date:
    type: timestamp
  _record_id:
    type: string
    description: Unique identifier for the record.
  _load_date:
    type: timestamp
    description: Timestamp indicating when the record was loaded.
  _trace:
    type: object
    properties:
      _record_id:
        type: string
      _source_table:
        type: string
    description: Tracking metadata for lineage and traceability.
  _dq_issue:
    type: boolean
    description: Flag indicating if the record has a data quality issue.
  _dq_issue_reason:
    type: array
    items:
      type: string
    description: Reason for the data quality issue.
  _silver_ts:
    type: timestamp
    description: Timestamp indicating when the record was written.
required:
- product_id
- sku
- product_name
